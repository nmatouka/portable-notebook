name: Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "experiments/offline-folder/notebook.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      # Export the demo notebook to a self-contained WASM page. Served online,
      # so it loads Pyodide + wheels from the CDN (no offline vendoring needed
      # here — that's what the desktop player adds).
      - name: Build the live notebook demo
        run: |
          uv run --with 'marimo==0.23.10' --with numpy \
            marimo export html-wasm experiments/offline-folder/notebook.py \
            -o site/demo --mode run

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

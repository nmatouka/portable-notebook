name: Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "experiments/offline-folder/notebook.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # Export the demo notebook to a self-contained WASM page. Served online,
      # so it loads Pyodide + wheels from the CDN (no offline vendoring needed
      # here — that's what the desktop player adds).
      - name: Build the live notebook demo
        run: |
          uv run --with 'marimo==0.23.10' --with numpy \
            marimo export html-wasm experiments/offline-folder/notebook.py \
            -o site/demo --mode run

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4

name: CI

on:
  push:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build-${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: app/src-tauri

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      # The frontend (app/frontend) is generated, not committed, and is embedded
      # into the binary at compile time via include_dir!. Regenerate it here:
      # export the marimo notebook to WASM-HTML, vendor Pyodide + wheels offline,
      # and sync it into app/frontend. Pin marimo so the export matches the
      # versions pinned in vendor's external-urls.txt.
      - name: Prepare offline frontend
        shell: bash
        run: |
          set -eux
          cd experiments/offline-folder
          uv run --with 'marimo==0.23.10' --with numpy \
            marimo export html-wasm notebook.py -o dist --mode run
          bash vendor.sh
          cd ../../app
          bash sync-frontend.sh

      # Compile the Tauri app on each OS — this is the cross-platform check: it
      # exercises the per-platform cfg (custom-protocol origin, single-instance on
      # Windows) and embeds the 49 MB frontend. Bundling installers is a follow-up.
      - name: Build app
        shell: bash
        run: |
          set -eux
          cd app/src-tauri
          cargo build
